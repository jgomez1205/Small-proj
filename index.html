<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="auth-page">

    <main class="auth-wrapper">

        <div class="auth-card">

            <div class="auth-brand">
                <div class="brand-icon">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <circle cx="10" cy="10" r="6" stroke="#74E7B5" stroke-width="2"/>
                        <path d="M2 24c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="#74E7B5" stroke-width="2" stroke-linecap="round"/>
                        <path d="M19 8h7M22.5 4.5v7" stroke="#CBF6E3" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <span class="brand-name">Contact Manager</span>
            </div>

            <div id="loginView">
                <h1 class="auth-heading">Welcome back</h1>
                <p class="auth-subheading">Sign in to your account</p>

                <div class="field-group">
                    <label for="loginUsername" class="field-label">Username</label>
                    <input type="text" class="field-input" id="loginUsername" autocomplete="username" placeholder="Enter your username">
                </div>

                <div class="field-group">
                    <label for="loginPassword" class="field-label">Password</label>
                    <input type="password" class="field-input" id="loginPassword" autocomplete="current-password" placeholder="Enter your password">
                </div>

                <button class="auth-btn" id="loginButton">Sign in</button>

                <p class="auth-switch">Don't have an account? <a href="#" id="toRegister" class="auth-switch-link">Register here</a></p>
            </div>

            <div id="registerView" style="display:none;">
                <h1 class="auth-heading">Create account</h1>
                <p class="auth-subheading">Fill in your details to get started</p>

                <div class="name-row">
                    <div class="field-group">
                        <label for="registerFirstName" class="field-label">First Name</label>
                        <input type="text" class="field-input" id="registerFirstName" autocomplete="given-name" placeholder="First">
                    </div>
                    <div class="field-group">
                        <label for="registerLastName" class="field-label">Last Name</label>
                        <input type="text" class="field-input" id="registerLastName" autocomplete="family-name" placeholder="Last">
                    </div>
                </div>

                <div class="field-group">
                    <label for="registerUsername" class="field-label">Username</label>
                    <input type="text" class="field-input" id="registerUsername" autocomplete="username" placeholder="Choose a username">
                </div>

                <div class="field-group">
                    <label for="registerPassword" class="field-label">Password</label>
                    <input type="password" class="field-input" id="registerPassword" autocomplete="new-password" placeholder="Choose a password">
                </div>

                <button class="auth-btn" id="registerButton">Create account</button>

                <p class="auth-switch">Already have an account? <a href="#" id="toLogin" class="auth-switch-link">Login here</a></p>
            </div>

            <p class="auth-result" id="loginResult" role="alert"></p>

        </div>

        <div class="auth-decoration" aria-hidden="true">
            <div class="deco-ring deco-ring-1"></div>
            <div class="deco-ring deco-ring-2"></div>
            <div class="deco-dot deco-dot-1"></div>
            <div class="deco-dot deco-dot-2"></div>
            <div class="deco-dot deco-dot-3"></div>
        </div>

    </main>

    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById("toRegister").addEventListener("click", function(e) {
            e.preventDefault();
            document.getElementById("loginView").style.display = "none";
            document.getElementById("registerView").style.display = "block";
            document.getElementById("loginResult").textContent = "";
        });
        document.getElementById("toLogin").addEventListener("click", function(e) {
            e.preventDefault();
            document.getElementById("registerView").style.display = "none";
            document.getElementById("loginView").style.display = "block";
            document.getElementById("loginResult").textContent = "";
        });
    </script>

</body>
</html>
