<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Contacts</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">

</head>

<body class="dark-bg">

    <!-- Main page container -->
    <div class="container-fluid p-0">

        <!-- Header section -->
        <div class="px-5 py-4">

            <!-- Top row -->
            <div class="d-flex justify-content-between align-items-center">

                <!-- Welcome title (username filled in by app.js) -->
                <h1 class="title-text m-0" id="welcomeText">
                    Hello, ...
                </h1>

                <!-- Logout button -->
                <button
                    class="btn custom-btn"
                    id="logoutButton">
                    Logout
                </button>

            </div>

        </div>

        <!-- Add/edit panel -->
        <div class="green-panel px-5 py-4 mb-4">

            <!-- Row container -->
            <div class="row g-5">

                <!-- Add contact column -->
                <div class="col-lg-6">

                    <!-- Add title -->
                    <h2 class="section-title mb-3">
                        Add Contact
                    </h2>

                    <!-- Form row -->
                    <div class="row g-3">

                        <!-- First name -->
                        <div class="col-md-6">
                            <label class="field-label">First Name <span class="dark-required-star">*</span></label>
                            <input
                                type="text"
                                class="form-control custom-input"
                                id="addFirstName">
                        </div>

                        <!-- Last name -->
                        <div class="col-md-6">
                            <label class="field-label">Last Name <span class="dark-required-star">*</span></label>
                            <input
                                type="text"
                                class="form-control custom-input"
                                id="addLastName">
                        </div>

                        <!-- Email -->
                        <div class="col-md-6">
                            <label class="field-label">Email <span class="dark-required-star">*</span></label>
                            <input
                                type="email"
                                class="form-control custom-input"
                                id="addEmail">
                        </div>

                        <!-- Phone -->
                        <div class="col-md-6">
                            <label class="field-label">Phone Number <span class="dark-required-star">*</span></label>
                            <input
                                type="text"
                                class="form-control custom-input"
                                id="addPhone">
                        </div>

                    </div>

                    <!-- Add button -->
                    <button
                        class="btn dark-btn mt-4"
                        id="addButton">
                        Add
                    </button>

                    <!-- Inline validation error for add form -->
                    <p class="dark-error-text mt-2 mb-0" id="addError"></p>

                </div>

                <!-- Edit contact column (disabled until a contact is selected) -->
                <div class="col-lg-6" id="editSection">

                    <!-- Edit title -->
                    <h2 class="section-title mb-3">
                        Edit Contact
                    </h2>

                    <!-- Form row -->
                    <div class="row g-3">

                        <!-- First name -->
                        <div class="col-md-6">
                            <label class="field-label">First Name <span class="dark-required-star">*</span></label>
                            <input
                                type="text"
                                class="form-control custom-input"
                                id="editFirstName"
                                disabled>
                        </div>

                        <!-- Last name -->
                        <div class="col-md-6">
                            <label class="field-label">Last Name <span class="dark-required-star">*</span></label>
                            <input
                                type="text"
                                class="form-control custom-input"
                                id="editLastName"
                                disabled>
                        </div>

                        <!-- Email -->
                        <div class="col-md-6">
                            <label class="field-label">Email <span class="dark-required-star">*</span></label>
                            <input
                                type="email"
                                class="form-control custom-input"
                                id="editEmail"
                                disabled>
                        </div>

                        <!-- Phone -->
                        <div class="col-md-6">
                            <label class="field-label">Phone Number <span class="dark-required-star">*</span></label>
                            <input
                                type="text"
                                class="form-control custom-input"
                                id="editPhone"
                                disabled>
                        </div>

                    </div>

                    <!-- Button row -->
                    <div class="d-flex gap-3 mt-4">

                        <!-- Update button -->
                        <button
                            class="btn dark-btn"
                            id="updateButton"
                            disabled>
                            Update
                        </button>

                        <!-- Delete button -->
                        <button
                            class="btn dark-btn"
                            id="deleteButton"
                            disabled>
                            Delete
                        </button>

                    </div>

                    <!-- Inline validation error for edit form -->
                    <p class="dark-error-text mt-2 mb-0" id="editError"></p>

                    <!-- No-selection hint -->
                    <p class="edit-hint mt-3" id="editHint">
                        Select a contact to edit or delete
                    </p>

                </div>

            </div>

        </div>

        <!-- Contacts section -->
        <div class="px-5 pb-5">

            <!-- Contacts title -->
            <h2 class="section-title text-white mb-3">
                Contacts
            </h2>

            <!-- Search bar -->
            <div class="input-group mb-4">

                <!-- Search input -->
                <input
                    type="text"
                    class="form-control custom-input"
                    id="searchInput"
                    placeholder="Search contacts...">

                <!-- Search button -->
                <button
                    class="btn search-btn"
                    id="searchButton">

                    <!-- Bootstrap search icon -->
                    <i class="bi bi-search"></i>

                </button>

            </div>

            <!-- Contacts grid (populated by app.js) -->
            <div class="row g-4" id="contactList"></div>

        </div>

    </div>

    <!-- Main JavaScript -->
    <script src="js/app.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
