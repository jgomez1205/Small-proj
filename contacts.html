<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="dark-bg">

    <div class="container-fluid p-0">

        <header class="app-header px-5 py-4">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <div class="brand-icon brand-icon-sm">
                        <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
                            <circle cx="10" cy="10" r="6" stroke="#74E7B5" stroke-width="2"/>
                            <path d="M2 24c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="#74E7B5" stroke-width="2" stroke-linecap="round"/>
                            <path d="M19 8h7M22.5 4.5v7" stroke="#CBF6E3" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h1 class="welcome-text m-0" id="welcomeText">Hello, ...</h1>
                </div>
                <button class="logout-btn" id="logoutButton">
                    <i class="bi bi-box-arrow-right"></i>
                    Logout
                </button>
            </div>
        </header>

        <div class="panel-section px-5 py-5 mb-4">
            <div class="row g-5">

                <div class="col-lg-6">
                    <div class="form-panel">
                        <h2 class="panel-title">Add Contact</h2>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="addFirstName" class="panel-field-label">First Name <span class="panel-required">*</span></label>
                                <input type="text" class="panel-input" id="addFirstName" autocomplete="off">
                            </div>
                            <div class="col-md-6">
                                <label for="addLastName" class="panel-field-label">Last Name <span class="panel-required">*</span></label>
                                <input type="text" class="panel-input" id="addLastName" autocomplete="off">
                            </div>
                            <div class="col-md-6">
                                <label for="addEmail" class="panel-field-label">Email <span class="panel-required">*</span></label>
                                <input type="email" class="panel-input" id="addEmail" autocomplete="off">
                            </div>
                            <div class="col-md-6">
                                <label for="addPhone" class="panel-field-label">Phone <span class="panel-required">*</span></label>
                                <input type="text" class="panel-input" id="addPhone" autocomplete="off">
                            </div>
                        </div>
                        <button class="panel-btn mt-4" id="addButton">
                            <i class="bi bi-person-plus"></i> Add Contact
                        </button>
                        <p class="panel-error mt-2 mb-0" id="addError" role="alert"></p>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="form-panel" id="editSection">
                        <h2 class="panel-title">Edit Contact</h2>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="editFirstName" class="panel-field-label">First Name <span class="panel-required">*</span></label>
                                <input type="text" class="panel-input" id="editFirstName" disabled autocomplete="off">
                            </div>
                            <div class="col-md-6">
                                <label for="editLastName" class="panel-field-label">Last Name <span class="panel-required">*</span></label>
                                <input type="text" class="panel-input" id="editLastName" disabled autocomplete="off">
                            </div>
                            <div class="col-md-6">
                                <label for="editEmail" class="panel-field-label">Email <span class="panel-required">*</span></label>
                                <input type="email" class="panel-input" id="editEmail" disabled autocomplete="off">
                            </div>
                            <div class="col-md-6">
                                <label for="editPhone" class="panel-field-label">Phone <span class="panel-required">*</span></label>
                                <input type="text" class="panel-input" id="editPhone" disabled autocomplete="off">
                            </div>
                        </div>
                        <div class="d-flex gap-3 mt-4">
                            <button class="panel-btn" id="updateButton" disabled>
                                <i class="bi bi-pencil"></i> Update
                            </button>
                            <button class="panel-btn panel-btn-danger" id="deleteButton" disabled>
                                <i class="bi bi-trash"></i> Delete
                            </button>
                        </div>
                        <p class="panel-error mt-2 mb-0" id="editError" role="alert"></p>
                        <p class="panel-hint mt-3 mb-0" id="editHint">Select a contact to edit or delete</p>
                    </div>
                </div>

            </div>
        </div>

        <section class="px-5 pb-5" aria-label="Contacts list">

            <div class="contacts-header mb-4">
                <h2 class="contacts-title">Your Contacts</h2>
                <div class="search-bar" role="search">
                    <label for="searchInput" class="visually-hidden">Search contacts</label>
                    <i class="bi bi-search search-icon" aria-hidden="true"></i>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search by first name, last name, email, or phone…">
                    <button class="search-btn" id="searchButton" aria-label="Search">Search</button>
                </div>
            </div>

            <div class="row g-4" id="contactList"></div>

        </section>

    </div>

    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
